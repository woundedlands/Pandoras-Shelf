<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural 3D Dice Roller</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #050508; color: #fff; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            padding: 10px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
            border: none;
            box-shadow: none;
            max-width: 340px;
        }
        
        button {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #eee;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            transition: all 0.2s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }
        button:hover { background: rgba(255,255,255,0.15); transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        
        #result {
            margin-top: 10px;
            font-size: 24px;
            font-weight: 800;
            color: #ffd700;
            min-height: 30px;
            text-shadow: 
                0 2px 4px rgba(0,0,0,1), 
                0 0px 8px rgba(0,0,0,0.8),
                1px 1px 0 rgba(0,0,0,0.8),
                -1px -1px 0 rgba(0,0,0,0.8);
            transform-origin: left center;
        }
        
        @keyframes resultPop {
            0% { transform: scale(0.8); opacity: 0; filter: blur(4px); }
            50% { transform: scale(1.05); filter: blur(0px); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-anim { animation: resultPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        input {
            padding: 10px;
            font-size: 14px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: white;
            width: 140px;
            outline: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.9);
        }
        input:focus { border-color: rgba(255,215,0,0.5); }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    <\/script>
</head>
<body>
    <div id="ui">
        <div class="btn-group">
            <button onclick="rollNotation('2d6')">2d6</button>
            <button onclick="rollNotation('3d6')">3d6</button>
            <button onclick="rollNotation('d20')">d20</button>
            <button onclick="rollNotation('Adv')">Adv</button>
            <button onclick="rollNotation('Dis')">Dis</button>
            <button onclick="rollNotation('4d6 dl')">4d6 dl</button>
            <button onclick="rollNotation('d7')">d7</button>
            <button onclick="rollNotation('d100')">d100</button>
        </div>
        <div style="display: flex; gap: 8px;">
            <input type="text" id="customInput" placeholder="Custom (e.g. 1d12)" value="2d10">
            <button onclick="rollNotation(document.getElementById('customInput').value)">Roll</button>
        </div>
        <div id="result">Ready to roll</div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer;
        let neonLeft, neonRight, neonBack;
        let dice = [];
        let pendingDice = 0;
        let results = [];
        let currentConfig = null;
        
        let animationFrameId = null;
        let isAnimating = false;
        let shakeIntensity = 0;
        let cooldownTime = 0;
        const originalCamPos = new THREE.Vector3(0, 16, 10);
        
        const clock = new THREE.Clock();

        const easeInQuad = t => t * t;
        const easeOutQuint = t => 1 - Math.pow(1 - t, 5);

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x050508, 0.018);

            camera = new THREE.PerspectiveCamera(20, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.copy(originalCamPos);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2; 
            document.body.appendChild(renderer.domElement);

            const bgCanvas = document.createElement('canvas');
            bgCanvas.width = 1024; bgCanvas.height = 1024;
            const bgCtx = bgCanvas.getContext('2d');
            const gradient = bgCtx.createRadialGradient(512, 512, 0, 512, 512, 512);
            gradient.addColorStop(0, '#1a1a25');
            gradient.addColorStop(0.6, '#0a0a10');
            gradient.addColorStop(1, '#020204');
            bgCtx.fillStyle = gradient;
            bgCtx.fillRect(0, 0, 1024, 1024);
            
            const imageData = bgCtx.getImageData(0, 0, 1024, 1024);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const noise = (Math.random() - 0.5) * 12;
                data[i] = Math.min(255, Math.max(0, data[i] + noise));
                data[i+1] = Math.min(255, Math.max(0, data[i+1] + noise));
                data[i+2] = Math.min(255, Math.max(0, data[i+2] + noise));
            }
            bgCtx.putImageData(imageData, 0, 0);
            scene.background = new THREE.CanvasTexture(bgCanvas);

            // Dimmed by 15% (Original: 0.4)
            const ambientLight = new THREE.AmbientLight(0x404050, 0.34);
            scene.add(ambientLight);

            // Dimmed by 15% (Original: 1.5)
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.275);
            keyLight.position.set(5, 15, 10);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.width = 2048;
            keyLight.shadow.mapSize.height = 2048;
            keyLight.shadow.camera.near = 0.5;
            keyLight.shadow.camera.far = 50;
            keyLight.shadow.bias = -0.0005;
            scene.add(keyLight);

            // Dimmed by 15% (Original: 1200)
            neonLeft = new THREE.PointLight(0x00aaff, 1020, 80, 1.5); 
            neonLeft.position.set(-15, 8, -5);
            scene.add(neonLeft);

            // Dimmed by 15% (Original: 1200)
            neonRight = new THREE.PointLight(0xff0055, 1020, 80, 1.5); 
            neonRight.position.set(15, 8, -5);
            scene.add(neonRight);

            // Dimmed by 15% (Original: 800)
            neonBack = new THREE.PointLight(0x8800ff, 680, 100, 1.5); 
            neonBack.position.set(0, 10, -25);
            scene.add(neonBack);

            const floorGeo = new THREE.PlaneGeometry(500, 500);
            const floorNoise = createOptimizedNoiseTexture();
            
            const floorMat = new THREE.MeshStandardMaterial({ 
                color: 0x1e1e28, 
                roughness: 0.6, 
                metalness: 0.1,
                roughnessMap: floorNoise,
                bumpMap: floorNoise,
                bumpScale: 0.015
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = 0; 
            floor.receiveShadow = true;
            scene.add(floor);

            window.addEventListener('resize', onWindowResize, false);
            renderOnce();
        }

        function updateCameraForCount(count) {
            let tier = Math.floor((count - 1) / 3);
            let z = 10 + tier * 5; 
            let y = 16 + tier * 8; 
            
            originalCamPos.set(0, y, z);
            camera.position.copy(originalCamPos);
            camera.lookAt(0, 0, 0);
        }

        function createOptimizedNoiseTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#808080';
            ctx.fillRect(0, 0, size, size);
            
            const imageData = ctx.getImageData(0, 0, size, size);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const noise = (Math.random() - 0.5) * 50; 
                data[i] += noise;
                data[i+1] += noise;
                data[i+2] += noise;
            }
            ctx.putImageData(imageData, 0, 0);
            
            ctx.filter = 'blur(3px)';
            ctx.drawImage(canvas, 0, 0);
            ctx.filter = 'none';
            
            for (let i = 0; i < 40; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const r = Math.random() * 120 + 60;
                const brightness = Math.random() > 0.5 ? 255 : 0;
                const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
                grad.addColorStop(0, \`rgba(\${brightness}, \${brightness}, \${brightness}, 0.06)\`);
                grad.addColorStop(1, 'rgba(128, 128, 128, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, size, size);
            }
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(6, 6); 
            return tex;
        }

        function createNumberTexture(num, sides) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.clearRect(0, 0, 128, 128);
            
            ctx.shadowColor = 'rgba(0,0,0,0.8)';
            ctx.shadowBlur = 6;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 2;

            ctx.fillStyle = '#ffffff';
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 3;
            ctx.font = 'bold 72px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            let text = num.toString();
            if (sides === 10 && num === 0) text = '0'; 
            
            ctx.strokeText(text, 64, 64);
            ctx.fillText(text, 64, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        function createD10Geometry(radius) {
            const vertices = [0, 0, 1, 0, 0, -1];
            for (let i = 0; i < 10; ++i) {
                const b = (i * Math.PI * 2) / 10;
                vertices.push(-Math.cos(b), -Math.sin(b), 0.105 * (i % 2 ? 1 : -1));
            }
            const faces = [
                [0, 2, 3], [0, 3, 4], [0, 4, 5], [0, 5, 6], [0, 6, 7],
                [0, 7, 8], [0, 8, 9], [0, 9, 10], [0, 10, 11], [0, 11, 2],
                [1, 3, 2], [1, 4, 3], [1, 5, 4], [1, 6, 5], [1, 7, 6],
                [1, 8, 7], [1, 9, 8], [1, 10, 9], [1, 11, 10], [1, 2, 11]
            ];
            return new THREE.PolyhedronGeometry(vertices, faces.flat(), radius, 0);
        }

        function createDieMesh(sides) {
            let geometry;
            let isStandard = [4, 6, 8, 10, 12, 20].includes(sides);
            let isSphere = sides > 20;

            if (sides === 4) geometry = new THREE.TetrahedronGeometry(1);
            else if (sides === 6) geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            else if (sides === 8) geometry = new THREE.OctahedronGeometry(1);
            else if (sides === 10) geometry = createD10Geometry(1);
            else if (sides === 12) geometry = new THREE.DodecahedronGeometry(1);
            else if (sides === 20) geometry = new THREE.IcosahedronGeometry(1);
            else if (isSphere) geometry = new THREE.SphereGeometry(1, 32, 32);
            else geometry = new THREE.CylinderGeometry(1, 1, 1.5, Math.max(3, sides));

            const hue = Math.random() * 360;
            const dieColor = new THREE.Color(\`hsl(\${hue}, 55%, 45%)\`);
            
            const noiseTex = createOptimizedNoiseTexture();
            noiseTex.repeat.set(2, 2); 
            
            const dieMat = new THREE.MeshStandardMaterial({
                color: dieColor,
                roughness: 0.6, 
                roughnessMap: noiseTex,
                bumpMap: noiseTex,
                bumpScale: 0.01,
                metalness: 0.05,
                envMapIntensity: 0.0
            });

            const mesh = new THREE.Mesh(geometry, dieMat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            const inradii = { 4: 0.33, 6: 0.6, 8: 0.58, 10: 0.75, 12: 0.79, 20: 0.79 };
            let restY = inradii[sides] !== undefined ? inradii[sides] : 1.0;
            mesh.userData.restY = restY;
            
            const faces = [];
            if (isSphere) {
                faces.push({ normal: new THREE.Vector3(0, 0, 1), centroid: new THREE.Vector3(0, 0, 1.01), value: 1, localUp: new THREE.Vector3(0, 1, 0) });
            } else {
                const geo = geometry.toNonIndexed();
                const pos = geo.attributes.position;
                const rawFaces = [];
                
                for (let i = 0; i < pos.count; i += 3) {
                    const v1 = new THREE.Vector3().fromBufferAttribute(pos, i);
                    const v2 = new THREE.Vector3().fromBufferAttribute(pos, i + 1);
                    const v3 = new THREE.Vector3().fromBufferAttribute(pos, i + 2);
                    const normal = new THREE.Vector3();
                    THREE.Triangle.getNormal(v1, v2, v3, normal);
                    const center = v1.clone().add(v2).add(v3).divideScalar(3);
                    if (normal.dot(center) < 0) normal.multiplyScalar(-1);
                    
                    let found = false;
                    for (let face of rawFaces) {
                        if (face.normal.distanceTo(normal) < 0.01) {
                            face.vertices.push(v1, v2, v3);
                            found = true; break;
                        }
                    }
                    if (!found) rawFaces.push({ normal: normal.clone(), vertices: [v1, v2, v3] });
                }
                
                for (let face of rawFaces) {
                    const centroid = new THREE.Vector3();
                    for (let v of face.vertices) centroid.add(v);
                    centroid.divideScalar(face.vertices.length);
                    face.centroid = centroid;
                    if (!isStandard && Math.abs(face.normal.y) > 0.9) continue;
                    faces.push(face);
                }
            }
            
            faces.forEach((face, index) => {
                let num = index + 1;
                if (sides === 10) num = index; 
                if (isSphere) num = sides; 
                face.value = num;
                
                const texture = createNumberTexture(num, sides);
                let labelSize = 0.6;
                if (face.vertices) {
                    let maxDist = 0;
                    for(let v of face.vertices) maxDist = Math.max(maxDist, v.distanceTo(face.centroid));
                    labelSize = maxDist * 0.75;
                }
                if (isSphere) labelSize = 1.2;
                
                const planeGeo = new THREE.PlaneGeometry(labelSize, labelSize);
                
                const planeMat = new THREE.MeshStandardMaterial({
                    map: texture, 
                    transparent: true, 
                    roughness: 0.4, 
                    metalness: 0.0,
                    emissiveMap: texture, 
                    emissive: 0xffffff, 
                    emissiveIntensity: 1.2, 
                    polygonOffset: true, 
                    polygonOffsetFactor: -2, 
                    polygonOffsetUnits: -2,
                    depthWrite: false
                });
                
                const plane = new THREE.Mesh(planeGeo, planeMat);
                plane.position.copy(face.centroid).add(face.normal.clone().multiplyScalar(0.01));
                
                const normal = face.normal;
                
                // Camera-Relative Projection: 
                // Camera is at +Z looking at origin. Text is readable if it points -Z (North).
                const readingDir = new THREE.Vector3(0, 0, -1); 
                
                // Project reading direction onto the face plane
                let projectedUp = readingDir.clone().sub(normal.clone().multiplyScalar(readingDir.dot(normal)));
                if (projectedUp.lengthSq() < 0.001) {
                    // Fallback for faces perfectly perpendicular to readingDir (e.g. front/back)
                    projectedUp.set(0, 1, 0).sub(normal.clone().multiplyScalar(normal.y)).normalize();
                }
                projectedUp.normalize();
                
                const right = new THREE.Vector3().crossVectors(projectedUp, normal).normalize();
                const correctedUp = new THREE.Vector3().crossVectors(normal, right).normalize();
                
                const matrix = new THREE.Matrix4();
                matrix.makeBasis(right, correctedUp, normal);
                plane.quaternion.setFromRotationMatrix(matrix);
                
                // Store localUp for the physics snap alignment
                face.localUp = correctedUp.clone();
                
                mesh.add(plane);
                face.plane = plane;
            });
            
            mesh.userData.faces = faces;
            mesh.userData.sides = sides;
            mesh.userData.isSphere = isSphere;
            return mesh;
        }

        function triggerCameraShake() { shakeIntensity = 0.15; }

        function rollDie(die, targetFaceIndex) {
            if (die.userData.isSphere) {
                const dirToCamera = camera.position.clone().sub(die.position).normalize();
                die.userData.targetQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), dirToCamera);
            } else {
                const targetFace = die.userData.faces[targetFaceIndex] || die.userData.faces[0];
                if (!targetFace) return;
                
                const up = new THREE.Vector3(0, 1, 0);
                const alignmentQuat = new THREE.Quaternion().setFromUnitVectors(targetFace.normal, up);
                
                // Target the exact North vector for perfect readability from the South camera
                const targetDir = new THREE.Vector3(0, 0, -1); 
                const worldLocalUp = targetFace.localUp.clone().applyQuaternion(alignmentQuat);
                const currentDir = new THREE.Vector3(worldLocalUp.x, 0, worldLocalUp.z).normalize();
                
                const angleCurrent = Math.atan2(currentDir.x, currentDir.z);
                const angleTarget = Math.atan2(targetDir.x, targetDir.z);
                
                let spinAngle = angleTarget - angleCurrent;
                // Normalize to shortest path
                while (spinAngle > Math.PI) spinAngle -= Math.PI * 2;
                while (spinAngle < -Math.PI) spinAngle += Math.PI * 2;
                
                const spinQuat = new THREE.Quaternion().setFromAxisAngle(up, spinAngle);
                die.userData.targetQuat = spinQuat.multiply(alignmentQuat);
            }
            
            die.userData.spinAxis = new THREE.Vector3(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5).normalize();
            die.userData.totalRotations = 4 + Math.random() * 4;
            
            const wobbleAngle = Math.random() * Math.PI * 2;
            die.userData.wobbleAxis = new THREE.Vector3(Math.cos(wobbleAngle), 0, Math.sin(wobbleAngle)).normalize();
            
            die.userData.state = 'rolling';
            die.userData.elapsed = 0;
            die.userData.duration = 2.0 + Math.random() * 0.5;
            
            die.userData.targetY = die.userData.restY;
            die.userData.initialY = die.userData.restY + 6 + Math.random() * 2;
            die.userData.shakeTriggered = false;
        }

        function getTopFaceIndex(die) {
            const up = new THREE.Vector3(0, 1, 0);
            let bestIndex = 0;
            let maxDot = -2;
            for (let i = 0; i < die.userData.faces.length; i++) {
                const worldNormal = die.userData.faces[i].normal.clone().applyQuaternion(die.quaternion);
                const dot = worldNormal.dot(up);
                if (dot > maxDot) { maxDot = dot; bestIndex = i; }
            }
            return bestIndex;
        }

        function onDieFinished(die) {
            let value;
            if (die.userData.isSphere) {
                value = die.userData.targetResult;
                const face = die.userData.faces[0];
                const newTexture = createNumberTexture(value, die.userData.sides);
                face.plane.material.map.dispose();
                face.plane.material.emissiveMap.dispose();
                face.plane.material.map = newTexture;
                face.plane.material.emissiveMap = newTexture;
                face.plane.material.needsUpdate = true;
                die.quaternion.copy(die.userData.targetQuat);
            } else {
                const faceIndex = getTopFaceIndex(die);
                if (faceIndex >= 0 && die.userData.faces[faceIndex]) {
                    value = die.userData.faces[faceIndex].value;
                } else {
                    value = 1;
                }
            }
            results.push(value);
            pendingDice--;
            if (pendingDice === 0) {
                calculateFinalResult(currentConfig, results);
            }
        }

        function calculateFinalResult(config, results) {
            results.sort((a, b) => a - b);
            let finalResults = [...results], dropped = [];
            
            if (config.advantage) { const max = Math.max(...finalResults); dropped = finalResults.filter(r => r !== max); finalResults = [max]; }
            else if (config.disadvantage) { const min = Math.min(...finalResults); dropped = finalResults.filter(r => r !== min); finalResults = [min]; }
            else if (config.dropLow) { dropped.push(finalResults[0]); finalResults.shift(); }
            else if (config.dropHigh) { dropped.push(finalResults[finalResults.length - 1]); finalResults.pop(); }
            
            const sum = finalResults.reduce((a, b) => a + b, 0);
            let resultText = \`Sum: \${sum} | Rolls: [\${results.join(', ')}]\`;
            if (dropped.length > 0) resultText += \` (Dropped: \${dropped.join(', ')})\`;
            
            const resultEl = document.getElementById('result');
            resultEl.innerText = resultText;
            resultEl.classList.remove('pop-anim');
            void resultEl.offsetWidth;
            resultEl.classList.add('pop-anim');
        }

        function parseDiceNotation(notation) {
            notation = notation.trim().toLowerCase();
            if (notation === 'adv' || notation === 'advantage') return { type: 20, count: 2, advantage: true, disadvantage: false, dropLow: false, dropHigh: false };
            if (notation === 'dis' || notation === 'disadvantage') return { type: 20, count: 2, advantage: false, disadvantage: true, dropLow: false, dropHigh: false };
            let dropLow = false, dropHigh = false;
            if (notation.includes('drop low') || notation.includes('dl')) { dropLow = true; notation = notation.replace(/drop low|dl/g, '').trim(); }
            if (notation.includes('drop high') || notation.includes('dh')) { dropHigh = true; notation = notation.replace(/drop high|dh/g, '').trim(); }
            const match = notation.match(/(\\d+)?d(\\d+)/);
            if (match) return { type: parseInt(match[2]), count: match[1] ? parseInt(match[1]) : 1, advantage: false, disadvantage: false, dropLow, dropHigh };
            return null;
        }

        window.rollNotation = function(notation) {
            const config = parseDiceNotation(notation);
            if (!config) { document.getElementById('result').innerText = "Invalid notation"; return; }
            
            dice.forEach(d => scene.remove(d));
            dice = [];
            currentConfig = config;
            
            shakeIntensity = 0;
            cooldownTime = 0;
            
            updateCameraForCount(config.count);
            
            for (let i = 0; i < config.count; i++) {
                const pos = new THREE.Vector3((i - (config.count - 1) / 2) * 2.5, 4, 0);
                const die = createDieMesh(config.type);
                scene.add(die);
                die.position.copy(pos);
                dice.push(die);
                if (die.userData.isSphere) die.userData.targetResult = Math.floor(Math.random() * config.type) + 1;
                rollDie(die, Math.floor(Math.random() * die.userData.faces.length));
            }
            pendingDice = config.count;
            results = [];
            
            const resultEl = document.getElementById('result');
            resultEl.innerText = "Rolling...";
            resultEl.classList.remove('pop-anim');

            startAnimationLoop();
        }

        function startAnimationLoop() {
            if (!isAnimating) {
                isAnimating = true;
                clock.start();
                animate();
            }
        }

        function stopAnimationLoop() {
            isAnimating = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        }

        function renderOnce() { renderer.render(scene, camera); }

        function animate() {
            if (!isAnimating) return;
            animationFrameId = requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            let allIdle = true;
            dice.forEach(die => {
                if (die.userData.state === 'rolling') {
                    allIdle = false;
                    die.userData.elapsed += delta;
                    const t = Math.min(die.userData.elapsed / die.userData.duration, 1);

                    let y;
                    if (t < 0.4) {
                        y = THREE.MathUtils.lerp(die.userData.initialY, die.userData.targetY, easeInQuad(t / 0.4));
                    } else {
                        const bounceT = (t - 0.4) / 0.6;
                        const decay = Math.exp(-bounceT * 6);
                        y = die.userData.targetY + Math.abs(Math.sin(bounceT * 12)) * 0.3 * decay;
                    }
                    die.position.y = y;

                    if (t >= 0.4 && t < 0.45 && !die.userData.shakeTriggered) {
                        die.userData.shakeTriggered = true;
                        triggerCameraShake();
                    }

                    const rotDecay = 1 - easeOutQuint(t); 
                    const mainAngle = die.userData.totalRotations * Math.PI * 2 * rotDecay;
                    const qMain = new THREE.Quaternion().setFromAxisAngle(die.userData.spinAxis, mainAngle);
                    
                    const qWobble = new THREE.Quaternion();
                    if (t > 0.7) {
                        const wt = (t - 0.7) / 0.3;
                        const wobbleDecay = Math.exp(-wt * 10);
                        const wobbleAngle = Math.sin(wt * 25) * 0.08 * wobbleDecay; 
                        qWobble.setFromAxisAngle(die.userData.wobbleAxis, wobbleAngle);
                    }
                    
                    die.quaternion.copy(die.userData.targetQuat)
                        .premultiply(qMain)
                        .premultiply(qWobble);

                    if (t >= 1) {
                        die.quaternion.copy(die.userData.targetQuat);
                        die.userData.state = 'idle';
                        onDieFinished(die);
                    }
                }
            });

            if (shakeIntensity > 0) {
                camera.position.x = originalCamPos.x + (Math.random() - 0.5) * shakeIntensity;
                camera.position.y = originalCamPos.y + (Math.random() - 0.5) * shakeIntensity;
                shakeIntensity *= Math.exp(-10 * delta);
                if (shakeIntensity < 0.001) {
                    camera.position.copy(originalCamPos);
                    shakeIntensity = 0;
                }
            }
            
            if (pendingDice === 0 && allIdle && cooldownTime === 0) {
                cooldownTime = 2.0;
            }
            if (cooldownTime > 0) {
                cooldownTime -= delta;
            }
            
            renderer.render(scene, camera);

            if (allIdle && pendingDice === 0 && cooldownTime <= 0 && shakeIntensity === 0) {
                stopAnimationLoop();
            }
        }

        function onWindowResize() {

(function() {
  const STORAGE_KEY = 'md_editor_state_v2';
  
  let state = {
    tabs: [{ id: Date.now(), title: 'Untitled', content: '' }],
    activeTabId: null,
    ui: { preview: false, sideBySide: false }
  };
  state.activeTabId = state.tabs[0].id;
  
  let simplemde = null;
  let saveTimeout = null;
  
  const tabsList = document.getElementById('tabs-list');
  const addTabBtn = document.getElementById('add-tab');
  const importBtn = document.getElementById('import-btn');
  const exportBtn = document.getElementById('export-btn');
  const importInput = document.getElementById('import-input');
  
  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.tabs && parsed.tabs.length > 0) {
          state = parsed;
        }
      } catch (e) {}
    }
  }
  
  function saveState() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }, 300);
  }
  
  function initEditor() {
    simplemde = new SimpleMDE({
      element: document.getElementById('editor'),
      spellChecker: false,
      autosave: { enabled: false },
      toolbar: [
        "bold", "italic", "heading", "|", 
        "quote", "unordered-list", "ordered-list", "|", 
        "link", "image", "table", "|",
        "preview", "side-by-side", "fullscreen", "|",
        "guide"
      ],
      placeholder: "Start typing...",
      status: ["lines", "words", "cursor"],
      forceSync: true,
      tabSize: 4,
      indentWithTabs: false,
      lineWrapping: true,
    });

      const activeTab = state.tabs.find(t => t.id === state.activeTabId);
      if (activeTab) {
        activeTab.content = simplemde.value();
        saveState();
      }
    });
    
    setTimeout(() => {
      if (state.ui.preview && !simplemde.isPreviewActive()) simplemde.togglePreview();
      if (state.ui.sideBySide && !simplemde.isSideBySideActive()) simplemde.toggleSideBySide();
      
      const previewBtn = document.querySelector('.editor-toolbar a[title="Toggle Preview"]');
      const sideBySideBtn = document.querySelector('.editor-toolbar a[title="Toggle Side by Side"]');
      
      const updateUIState = () => {
        setTimeout(() => {
          state.ui.preview = simplemde.isPreviewActive();
          state.ui.sideBySide = simplemde.isSideBySideActive();
          saveState();
        }, 100);
      };
      
      if (previewBtn) previewBtn.addEventListener('click', updateUIState);
      if (sideBySideBtn) sideBySideBtn.addEventListener('click', updateUIState);
    }, 100);
  }
  
  function renderTabs() {
    tabsList.innerHTML = '';
    state.tabs.forEach(tab => {
      const tabEl = document.createElement('div');
      tabEl.className = \`tab \${tab.id === state.activeTabId ? 'active' : ''}\`;
      tabEl.dataset.id = tab.id;
      
      const closeBtn = document.createElement('button');
      closeBtn.className = 'tab-close';
      closeBtn.innerHTML = '×';
      closeBtn.title = 'Close tab';
      closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeTab(tab.id); });
      
      const titleEl = document.createElement('span');
      titleEl.className = 'tab-title';
      titleEl.textContent = tab.title;
      titleEl.title = tab.title;
      
      tabEl.appendChild(closeBtn);
      tabEl.appendChild(titleEl);
      
      tabEl.addEventListener('click', () => switchTab(tab.id));

    const tab = state.tabs.find(t => t.id === id);

    input.className = 'tab-title-input';
    input.value = tab.title;

    input.focus();
    input.select();
    
    const finishEdit = () => {
      tab.title = input.value.trim() || 'Untitled';
      saveState();
      renderTabs();

    });
  }
  
  function switchTab(id) {
    if (state.activeTabId === id) return;
    
    const currentTab = state.tabs.find(t => t.id === state.activeTabId);
    if (currentTab && simplemde) {
      currentTab.cursor = simplemde.codemirror.getCursor();
      currentTab.scroll = simplemde.codemirror.getScrollInfo();
    }
    
    state.activeTabId = id;
    const newTab = state.tabs.find(t => t.id === id);
    
    if (simplemde) {
      simplemde.value(newTab.content || '');
      if (newTab.cursor) simplemde.codemirror.setCursor(newTab.cursor);
      if (newTab.scroll) simplemde.codemirror.scrollTo(newTab.scroll.left, newTab.scroll.top);
      simplemde.codemirror.focus();
    }
    
    renderTabs();
    saveState();
  }
  
  function addTab(title = 'Untitled', content = '') {
    const newTab = {
      id: Date.now(),

    if (activeTab.scroll) simplemde.codemirror.scrollTo(activeTab.scroll.left, activeTab.scroll.top);
  }
})();

  .filelist li .size { color: var(--muted); white-space: nowrap; }
  .filelist li .nested { color: var(--warn); }

  .preview {
    margin-top: 18px;
    display: none;
  }
  .preview.show { display: block; }
  .preview h2 {
    font-family: var(--mono);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .preview pre {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.55;
    max-height: 340px;
    overflow: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: #c3ccd6;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1><span class="path">zip</span> → merge → <span class="path">one file</span></h1>
    <p>Drop a zip archive, pick which extensions to keep, get a single merged text file. Nested folders and nested zips are walked to any depth.</p>
  </header>

  <div class="drop" id="drop" tabindex="0" role="button" aria-label="Choose or drop a zip file">
    <div class="big" id="dropMain">Drop a .zip here or click to browse</div>
    <div class="hint" id="dropHint">nothing loaded yet</div>
    <input type="file" id="fileInput" accept=".zip" hidden>
  </div>

  <div class="grid">
    <fieldset>
      <legend>Filter</legend>
      <label for="exts">Extensions to include (comma-separated, no dots needed)</label>
      <input type="text" id="exts" value="md" spellcheck="false" placeholder="md, txt, json">
      <label class="check-row" style="margin-top:12px">
        <input type="checkbox" id="recurseZips" checked>
        <span>Unpack nested .zip archives too</span>
      </label>
    </fieldset>

    <fieldset>
      <legend>File titles</legend>
      <label class="radio-row"><input type="radio" name="title" value="md" checked> <span>Markdown heading <span class="sub">## path/file.md</span></span></label>
      <label class="radio-row"><input type="radio" name="title" value="raw"> <span>Raw separator <span class="sub">=== path/file.md ===</span></span></label>
      <label class="radio-row"><input type="radio" name="title" value="none"> <span>No titles, content only</span></label>
      <label for="outName" style="margin-top:12px">Output file name</label>
      <input type="text" id="outName" value="merged.md" spellcheck="false">
    </fieldset>
  </div>

  <div class="actions">
    <button class="primary" id="mergeBtn" disabled>Merge &amp; download</button>
    <button id="previewBtn" disabled>Preview</button>
    <span class="status" id="status"></span>
  </div>

  <div class="filelist" id="filelist">
    <div class="head"><span id="flTitle">Matched files</span><span id="flCount"></span></div>
    <ul id="flItems"></ul>
  </div>

  <div class="preview" id="previewWrap">
    <h2>Preview (first 8,000 characters)</h2>
    <pre id="previewPre"></pre>
  </div>
</div>

<script>
(function () {
  const drop = document.getElementById('drop');
  const fileInput = document.getElementById('fileInput');
  const dropMain = document.getElementById('dropMain');
  const dropHint = document.getElementById('dropHint');
  const extsInput = document.getElementById('exts');
  const recurseZips = document.getElementById('recurseZips');
  const outName = document.getElementById('outName');
  const mergeBtn = document.getElementById('mergeBtn');
  const previewBtn = document.getElementById('previewBtn');
  const statusEl = document.getElementById('status');
  const filelist = document.getElementById('filelist');
  const flItems = document.getElementById('flItems');
  const flCount = document.getElementById('flCount');
  const previewWrap = document.getElementById('previewWrap');
  const previewPre = document.getElementById('previewPre');

  let loadedFile = null;     // the File object
  let collected = [];        // [{ path, text }]
  let lastAutoExt = 'md';

  function setStatus(msg, cls) {
    statusEl.textContent = msg || '';
    statusEl.className = 'status' + (cls ? ' ' + cls : '');
  }

  function parseExts() {
    return extsInput.value
      .split(',')
      .map(function (s) { return s.trim().replace(/^\\./, '').toLowerCase(); })
      .filter(function (s) { return s.length > 0; });
  }

  function extOf(path) {
    const base = path.split('/').pop();
    const i = base.lastIndexOf('.');
    if (i <= 0) { return ''; }
    return base.slice(i + 1).toLowerCase();
  }

  function fmtSize(n) {
    if (n < 1024) { return n + ' B'; }
    if (n < 1024 * 1024) { return (n / 1024).toFixed(1) + ' KB'; }
    return (n / (1024 * 1024)).toFixed(1) + ' MB';
  }

  // Recursively walk a JSZip instance; prefix carries the path of the parent zip.
  async function walkZip(zip, prefix, exts, allowNested, out, depth) {
    if (depth > 12) { return; } // sanity limit against zip bombs / cycles
    const entries = [];
    zip.forEach(function (relPath, entry) {
      if (!entry.dir) { entries.push({ relPath: relPath, entry: entry }); }
    });
    // stable, human-friendly ordering
    entries.sort(function (a, b) { return a.relPath.localeCompare(b.relPath); });

    for (const item of entries) {
      const fullPath = prefix + item.relPath;
      const ext = extOf(item.relPath);

      if (ext === 'zip' && allowNested) {
        try {
          const buf = await item.entry.async('arraybuffer');
          const inner = await JSZip.loadAsync(buf);
          await walkZip(inner, fullPath + '!/', exts, allowNested, out, depth + 1);
        } catch (e) {
          out.errors.push(fullPath + ' (could not open nested zip)');
        }
        continue;
      }

      if (exts.indexOf(ext) !== -1) {
        const text = await item.entry.async('string');
        out.files.push({ path: fullPath, text: text, size: text.length, nested: prefix !== '' });
      }
    }
  }

  async function scan() {
    if (!loadedFile) { return; }
    const exts = parseExts();
    if (exts.length === 0) {
      setStatus('add at least one extension', 'warn');
      return;
    }
    setStatus('scanning…');
    mergeBtn.disabled = true;
    previewBtn.disabled = true;
    try {
      const zip = await JSZip.loadAsync(loadedFile);
      const out = { files: [], errors: [] };
      await walkZip(zip, '', exts, recurseZips.checked, out, 0);
      collected = out.files;
      renderFileList(out);
      if (collected.length === 0) {
        setStatus('no .' + exts.join(' / .') + ' files found in archive', 'warn');
      } else {
        setStatus(collected.length + ' file' + (collected.length === 1 ? '' : 's') + ' matched', 'ok');
        mergeBtn.disabled = false;
        previewBtn.disabled = false;
      }
    } catch (e) {
      setStatus('could not read zip: ' + e.message, 'warn');
      collected = [];
      filelist.classList.remove('show');
    }
  }

  function renderFileList(out) {
    flItems.innerHTML = '';
    for (const f of collected) {
      const li = document.createElement('li');
      const name = document.createElement('span');
      name.textContent = f.path;
      if (f.nested) { name.classList.add('nested'); name.title = 'from a nested zip'; }
      const size = document.createElement('span');
      size.className = 'size';
      size.textContent = fmtSize(f.size);
      li.appendChild(name);
      li.appendChild(size);
      flItems.appendChild(li);
    }
    for (const err of out.errors) {
      const li = document.createElement('li');
      li.innerHTML = '<span class="nested"></span>';
      li.firstChild.textContent = '⚠ ' + err;
      flItems.appendChild(li);
    }
    flCount.textContent = collected.length + ' matched';
    filelist.classList.toggle('show', collected.length > 0 || out.errors.length > 0);
  }

  function titleMode() {
    return document.querySelector('input[name=title]:checked').value;
  }

  function buildOutput() {
    const mode = titleMode();
    const parts = [];
    for (const f of collected) {
      let block = '';
      if (mode === 'md') {
        block = '## ' + f.path + '\\n\\n' + f.text.replace(/\\s+$/, '') + '\\n';
      } else if (mode === 'raw') {
        block = '=== ' + f.path + ' ===\\n\\n' + f.text.replace(/\\s+$/, '') + '\\n';
      } else {
        block = f.text.replace(/\\s+$/, '') + '\\n';
      }
      parts.push(block);
    }
    return parts.join('\\n');
  }

  function doMerge() {
    if (collected.length === 0) { return; }
    const content = buildOutput();
    const name = outName.value.trim() || 'merged.md';
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 2000);
    setStatus('downloaded ' + name + ' (' + fmtSize(content.length) + ')', 'ok');
  }

  function doPreview() {
    if (collected.length === 0) { return; }
    const content = buildOutput();
    previewPre.textContent = content.slice(0, 8000) + (content.length > 8000 ? '\\n\\n… (' + fmtSize(content.length - 8000) + ' more)' : '');
    previewWrap.classList.add('show');
    previewWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function acceptFile(file) {
    if (!file) { return; }
    if (!/\\.zip$/i.test(file.name)) {
      setStatus('that is not a .zip file', 'warn');
      return;
    }
    loadedFile = file;
    drop.classList.add('loaded');
    dropMain.innerHTML = 'Loaded: <span class="fname"></span>';
    dropMain.querySelector('.fname').textContent = file.name;
    dropHint.textContent = fmtSize(file.size) + ' — drop another zip to replace';
    previewWrap.classList.remove('show');
    scan();
  }

  // If user changes extensions, keep the output filename extension in sync
  // (only if they haven't customized the name beyond "merged.<ext>")
  extsInput.addEventListener('change', function () {
    const exts = parseExts();
    const first = exts[0] || 'md';
    if (outName.value === 'merged.' + lastAutoExt) {
      outName.value = 'merged.' + first;
    }
    lastAutoExt = first;
    if (loadedFile) { scan(); }
  });
  recurseZips.addEventListener('change', function () {
    if (loadedFile) { scan(); }
  });

  drop.addEventListener('click', function () { fileInput.click(); });
  drop.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); }
  });
  fileInput.addEventListener('change', function () { acceptFile(fileInput.files[0]); });

  ['dragenter', 'dragover'].forEach(function (ev) {
    drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.add('over'); });
  });
  ['dragleave', 'drop'].forEach(function (ev) {
    drop.addEventListener(ev, function (e) { e.preventDefault(); drop.classList.remove('over'); });
  });
  drop.addEventListener('drop', function (e) {
    acceptFile(e.dataTransfer.files[0]);
  });

  mergeBtn.addEventListener('click', doMerge);
  previewBtn.addEventListener('click', doPreview);
})();
<\/script>
</body>
