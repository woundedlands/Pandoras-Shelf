<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markdown Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    width: 100%; height: 100%;
    background: #18121f;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    color: #e8e0f5;
    overflow: hidden;
  }
  
  :root {
    --bg: #18121f;
    --surface: #2a2139;
    --surface-alt: #1e1828;
    --border: #3d3254;
    --accent: #6c5ce7;
    --accent-hover: #7c6df7;
    --text-primary: #e8e0f5;
    --text-secondary: #a59cc7;
  }
  
  .editor-app {
    display: flex;
    flex-direction: column;
    width: 100%; height: 100%;
    background: var(--bg);
  }
  
  .app-header {
    display: flex;
    align-items: center;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1vmin;
    gap: 1vmin;
    height: clamp(40px, 6vh, 64px);
    flex-shrink: 0;
  }
  
  .tabs-container {
    display: flex;
    align-items: center;
    flex: 1;
    min-width: 0;
    gap: 0.5vmin;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  
  .tabs-container::-webkit-scrollbar { height: 4px; }
  .tabs-container::-webkit-scrollbar-track { background: transparent; }
  .tabs-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  
  .tabs-list {
    display: flex;
    gap: 0.5vmin;
    height: 100%;
    align-items: center;
  }
  
  .tab {
    display: flex;
    align-items: center;
    gap: 0.8vmin;
    padding: 0 1.5vmin;
    height: clamp(24px, 4vmin, 40px);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 1vmin;
    font-size: clamp(12px, 1.8vmin, 16px);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    user-select: none;
  }
  
  .tab:hover { background: var(--border); color: var(--text-primary); }
  
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  
  .tab-title {
    max-width: 18vmin;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  
  .tab-title-input {
    background: transparent;
    border: none;
    outline: none;
    color: inherit;
    font: inherit;
    width: 12vmin;
  }
  
  .tab-close {
    background: none; border: none;
    color: inherit;
    cursor: pointer;
    font-size: 1.2em;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.2s, background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2.5vmin; height: 2.5vmin;
    border-radius: 0.5vmin;
    flex-shrink: 0;
  }
  
  .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.1); }
  .tab.active .tab-close:hover { background: rgba(0,0,0,0.2); }
  
  .header-actions {
    display: flex;
    gap: 1vmin;
    flex-shrink: 0;
  }
  
  .btn {
    padding: 0 2vmin;
    height: clamp(24px, 4vmin, 40px);
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 1vmin;
    color: var(--text-primary);
    font-size: clamp(12px, 1.8vmin, 16px);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 0.8vmin;
  }
  
  .btn:hover { background: var(--border); }
  
  .btn-icon {
    width: clamp(24px, 4vmin, 40px);
    height: clamp(24px, 4vmin, 40px);
    background: var(--accent);
    border: none;
    border-radius: 1vmin;
    color: #fff;
    font-size: clamp(16px, 2.5vmin, 24px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  
  .btn-icon:hover { background: var(--accent-hover); }
  
  .editor-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  
  .CodeMirror, .CodeMirror-scroll {
    background: var(--surface-alt) !important;
    color: var(--text-primary) !important;
    height: 100% !important;
    font-family: 'SF Mono', Monaco, 'Cascadia Mono', 'Roboto Mono', monospace !important;
    font-size: clamp(14px, 2vmin, 18px) !important;
  }
  
  .CodeMirror-cursor { border-left: 1px solid var(--accent-hover) !important; }
  .CodeMirror-selected { background: var(--border) !important; }
  .CodeMirror-focused .CodeMirror-selected { background: var(--accent) !important; opacity: 0.3; }
  .CodeMirror-gutters { background: var(--surface-alt) !important; border-right: 1px solid var(--border) !important; }
  .CodeMirror-linenumber { color: var(--text-secondary) !important; }
  
  .cm-s-simplemde .cm-header { color: var(--accent-hover) !important; font-weight: bold; }
  .cm-s-simplemde .cm-quote { color: var(--text-secondary) !important; font-style: italic; }
  .cm-s-simplemde .cm-link { color: #88d8b0 !important; text-decoration: none; }
  .cm-s-simplemde .cm-url { color: #a59cc7 !important; text-decoration: underline; }
  .cm-s-simplemde .cm-strong { color: #e8e0f5 !important; font-weight: bold; }
  .cm-s-simplemde .cm-em { color: #e8e0f5 !important; font-style: italic; }
  .cm-s-simplemde .cm-tag { color: #e17055 !important; }
  .cm-s-simplemde .cm-attribute { color: #feca57 !important; }
  .cm-s-simplemde .cm-string { color: #88d8b0 !important; }
  .cm-s-simplemde .cm-comment { color: #a59cc7 !important; background: rgba(255,255,255,0.05); border-radius: 2px; }
  .cm-s-simplemde .cm-formatting-list { color: var(--accent) !important; }
  .cm-s-simplemde .cm-formatting-code { color: var(--accent) !important; }
  
  .editor-toolbar {
    background: var(--surface) !important;
    border: none !important;
    border-bottom: 1px solid var(--border) !important;
    padding: 0.8vmin 1vmin !important;
    opacity: 1 !important;
    display: flex !important;
    flex-wrap: wrap !important;
    align-items: center !important;
    gap: 0.5vmin !important;
  }
  
  .editor-toolbar::before, .editor-toolbar::after { display: none !important; }
  
  .editor-toolbar a {
    color: var(--text-secondary) !important;
    border-radius: 0.8vmin !important;
    width: clamp(24px, 3.5vmin, 36px) !important;
    height: clamp(24px, 3.5vmin, 36px) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    margin: 0 !important;
    transition: all 0.2s !important;
    border: none !important;
  }
  
  .editor-toolbar a:hover, .editor-toolbar a.active {
    background: var(--border) !important;
    color: var(--text-primary) !important;
  }
  
  .editor-toolbar.disabled-for-preview {
    background: var(--surface-alt) !important;
  }
  
  .editor-toolbar.disabled-for-preview a:not(.no-disable) {
    opacity: 0.3 !important;
    pointer-events: none;
    cursor: default;
  }
  
  .editor-toolbar .separator {
    display: inline-block;
    width: 1px;
    height: 2.5vmin;
    background: var(--border);
    margin: 0 0.5vmin;
  }
  
  .editor-preview, .editor-preview-side {
    background: var(--surface-alt) !important;
    color: var(--text-primary) !important;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
    font-size: clamp(14px, 2vmin, 18px) !important;
    padding: 2vmin !important;
  }
  
  .editor-preview pre, .editor-preview-side pre {
    background: var(--surface) !important;
    color: var(--text-primary) !important;
    padding: 1.5vmin !important;
    border-radius: 0.8vmin !important;
    border: 1px solid var(--border) !important;
    overflow-x: auto;
  }
  
  .editor-preview code, .editor-preview-side code {
    background: var(--surface) !important;
    color: var(--accent-hover) !important;
    padding: 0.2vmin 0.5vmin !important;
    border-radius: 0.4vmin !important;
    font-family: 'SF Mono', Monaco, 'Cascadia Mono', 'Roboto Mono', monospace !important;
  }
  
  .editor-preview a, .editor-preview-side a { color: var(--accent-hover) !important; }
  
  .editor-preview blockquote, .editor-preview-side blockquote {
    border-left: 4px solid var(--accent) !important;
    margin: 1em 0 !important;
    padding: 0.5em 1em !important;
    background: rgba(108, 92, 231, 0.1) !important;
    border-radius: 0 0.5vmin 0.5vmin 0 !important;
    color: var(--text-secondary) !important;
  }
  
  .editor-preview table, .editor-preview-side table {
    border-collapse: collapse !important;
    width: 100% !important;
    margin: 1em 0 !important;
  }
  
  .editor-preview th, .editor-preview td, .editor-preview-side th, .editor-preview-side td {
    border: 1px solid var(--border) !important;
    padding: 0.8vmin !important;
  }
  
  .editor-preview th, .editor-preview-side th { background: var(--surface) !important; }
  
  .editor-statusbar {
    background: var(--surface) !important;
    color: var(--text-secondary) !important;
    border-top: 1px solid var(--border) !important;
    padding: 0.5vmin 1.5vmin !important;
    font-size: clamp(11px, 1.5vmin, 14px) !important;
    height: clamp(20px, 3vmin, 32px) !important;
    flex-shrink: 0;
  }
  
  .CodeMirror-fullscreen, .editor-toolbar.fullscreen, .editor-preview-side.fullscreen {
    position: fixed !important;
    top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
    z-index: 9999 !important;
  }
  
  #import-input { display: none; }
  
  .editor-preview::-webkit-scrollbar, .editor-preview-side::-webkit-scrollbar { width: 8px; }
  .editor-preview::-webkit-scrollbar-track, .editor-preview-side::-webkit-scrollbar-track { background: transparent; }
  .editor-preview::-webkit-scrollbar-thumb, .editor-preview-side::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  
  @media (max-width: 600px) {
    .header-actions .btn-text { display: none; }
    .btn { padding: 0 1.5vmin; }
  }
</style>
</head>
<body>
<div class="editor-app">
  <div class="app-header">
    <div class="tabs-container">
      <div class="tabs-list" id="tabs-list"></div>
      <button class="btn-icon" id="add-tab" title="New Tab (Ctrl+T)">+</button>
    </div>
    <div class="header-actions">
      <button class="btn" id="import-btn" title="Import Markdown">
        <svg width="1.2em" height="1.2em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
        <span class="btn-text">Import</span>
      </button>
      <button class="btn" id="export-btn" title="Export Markdown (Ctrl+S)">
        <svg width="1.2em" height="1.2em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <span class="btn-text">Export</span>
      </button>
    </div>
  </div>
  <div class="editor-container">
    <textarea id="editor"></textarea>
  </div>
</div>
<input type="file" id="import-input" accept=".md,.txt,.markdown">
<script src="https://cdn.jsdelivr.net/simplemde/latest/simplemde.min.js"></script>
<script>
(function() {
  const STORAGE_KEY = 'md_editor_state_v2';
  
  let state = {
    tabs: [{ id: Date.now(), title: 'Untitled', content: '' }],
    activeTabId: null,
    ui: { preview: false, sideBySide: false }
  };
  state.activeTabId = state.tabs[0].id;
  
  let simplemde = null;
  let saveTimeout = null;
  
  const tabsList = document.getElementById('tabs-list');
  const addTabBtn = document.getElementById('add-tab');
  const importBtn = document.getElementById('import-btn');
  const exportBtn = document.getElementById('export-btn');
  const importInput = document.getElementById('import-input');
  
  function loadState() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      try {
        const parsed = JSON.parse(saved);
        if (parsed && parsed.tabs && parsed.tabs.length > 0) {
          state = parsed;
        }
      } catch (e) {}
    }
  }
  
  function saveState() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }, 300);
  }
  
  function initEditor() {
    simplemde = new SimpleMDE({
      element: document.getElementById('editor'),
      spellChecker: false,
      autosave: { enabled: false },
      toolbar: [
        "bold", "italic", "heading", "|", 
        "quote", "unordered-list", "ordered-list", "|", 
        "link", "image", "table", "|",
        "preview", "side-by-side", "fullscreen", "|",
        "guide"
      ],
      placeholder: "Start typing...",
      status: ["lines", "words", "cursor"],
      forceSync: true,
      tabSize: 4,
      indentWithTabs: false,
      lineWrapping: true,
    });
    
    simplemde.codemirror.on('change', () => {
      const activeTab = state.tabs.find(t => t.id === state.activeTabId);
      if (activeTab) {
        activeTab.content = simplemde.value();
        saveState();
      }
    });
    
    setTimeout(() => {
      if (state.ui.preview && !simplemde.isPreviewActive()) simplemde.togglePreview();
      if (state.ui.sideBySide && !simplemde.isSideBySideActive()) simplemde.toggleSideBySide();
      
      const previewBtn = document.querySelector('.editor-toolbar a[title="Toggle Preview"]');
      const sideBySideBtn = document.querySelector('.editor-toolbar a[title="Toggle Side by Side"]');
      
      const updateUIState = () => {
        setTimeout(() => {
          state.ui.preview = simplemde.isPreviewActive();
          state.ui.sideBySide = simplemde.isSideBySideActive();
          saveState();
        }, 100);
      };
      
      if (previewBtn) previewBtn.addEventListener('click', updateUIState);
      if (sideBySideBtn) sideBySideBtn.addEventListener('click', updateUIState);
    }, 100);
  }
  
  function renderTabs() {
    tabsList.innerHTML = '';
    state.tabs.forEach(tab => {
      const tabEl = document.createElement('div');
      tabEl.className = `tab ${tab.id === state.activeTabId ? 'active' : ''}`;
      tabEl.dataset.id = tab.id;
      
      const closeBtn = document.createElement('button');
      closeBtn.className = 'tab-close';
      closeBtn.innerHTML = '×';
      closeBtn.title = 'Close tab';
      closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeTab(tab.id); });
      
      const titleEl = document.createElement('span');
      titleEl.className = 'tab-title';
      titleEl.textContent = tab.title;
      titleEl.title = tab.title;
      
      tabEl.appendChild(closeBtn);
      tabEl.appendChild(titleEl);
      
      tabEl.addEventListener('click', () => switchTab(tab.id));
      tabEl.addEventListener('dblclick', (e) => { e.stopPropagation(); editTabTitle(tab.id, titleEl); });
      
      tabsList.appendChild(tabEl);
    });
  }
  
  function editTabTitle(id, titleEl) {
    const tab = state.tabs.find(t => t.id === id);
    if (!tab) return;
    
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'tab-title-input';
    input.value = tab.title;
    
    titleEl.replaceWith(input);
    input.focus();
    input.select();
    
    const finishEdit = () => {
      tab.title = input.value.trim() || 'Untitled';
      saveState();
      renderTabs();
    };
    
    input.addEventListener('blur', finishEdit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { input.value = tab.title; input.blur(); }
    });
  }
  
  function switchTab(id) {
    if (state.activeTabId === id) return;
    
    const currentTab = state.tabs.find(t => t.id === state.activeTabId);
    if (currentTab && simplemde) {
      currentTab.cursor = simplemde.codemirror.getCursor();
      currentTab.scroll = simplemde.codemirror.getScrollInfo();
    }
    
    state.activeTabId = id;
    const newTab = state.tabs.find(t => t.id === id);
    
    if (simplemde) {
      simplemde.value(newTab.content || '');
      if (newTab.cursor) simplemde.codemirror.setCursor(newTab.cursor);
      if (newTab.scroll) simplemde.codemirror.scrollTo(newTab.scroll.left, newTab.scroll.top);
      simplemde.codemirror.focus();
    }
    
    renderTabs();
    saveState();
  }
  
  function addTab(title = 'Untitled', content = '') {
    const newTab = {
      id: Date.now(),
      title: title,
      content: content,
      cursor: { line: 0, ch: 0 },
      scroll: { left: 0, top: 0 }
    };
    state.tabs.push(newTab);
    state.activeTabId = newTab.id;
    
    if (simplemde) {
      simplemde.value(content);
      simplemde.codemirror.setCursor(0, 0);
      simplemde.codemirror.focus();
    }
    
    renderTabs();
    saveState();
  }
  
  function closeTab(id) {
    if (state.tabs.length <= 1) return;
    
    const index = state.tabs.findIndex(t => t.id === id);
    state.tabs.splice(index, 1);
    
    if (state.activeTabId === id) {
      const newIndex = Math.max(0, index - 1);
      state.activeTabId = state.tabs[newIndex].id;
      const newTab = state.tabs[newIndex];
      if (simplemde) {
        simplemde.value(newTab.content || '');
        if (newTab.cursor) simplemde.codemirror.setCursor(newTab.cursor);
        if (newTab.scroll) simplemde.codemirror.scrollTo(newTab.scroll.left, newTab.scroll.top);
        simplemde.codemirror.focus();
      }
    }
    
    renderTabs();
    saveState();
  }
  
  addTabBtn.addEventListener('click', () => addTab());
  
  importBtn.addEventListener('click', () => importInput.click());
  importInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      let title = file.name;
      if (title.endsWith('.md') || title.endsWith('.txt') || title.endsWith('.markdown')) {
        title = title.substring(0, title.lastIndexOf('.'));
      }
      addTab(title, event.target.result);
    };
    reader.readAsText(file);
    importInput.value = '';
  });
  
  exportBtn.addEventListener('click', () => {
    const activeTab = state.tabs.find(t => t.id === state.activeTabId);
    if (!activeTab) return;
    
    const blob = new Blob([activeTab.content], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${activeTab.title || 'document'}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
  
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); addTab(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'w') { e.preventDefault(); closeTab(state.activeTabId); }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); exportBtn.click(); }
  });
  
  loadState();
  initEditor();
  renderTabs();
  
  const activeTab = state.tabs.find(t => t.id === state.activeTabId);
  if (activeTab && simplemde) {
    simplemde.value(activeTab.content || '');
    if (activeTab.cursor) simplemde.codemirror.setCursor(activeTab.cursor);
    if (activeTab.scroll) simplemde.codemirror.scrollTo(activeTab.scroll.left, activeTab.scroll.top);
  }
})();
</script>
</body>
</html>
